<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Engram</title>
<style>
  body { background: #111; color: #eee; font-family: system-ui, sans-serif; max-width: 600px;
         margin: 0 auto; padding: 1rem; }
  input, textarea, button { font: inherit; }
  input, textarea { width: 100%; box-sizing: border-box; background: #222; color: #eee;
                     border: 1px solid #444; border-radius: 6px; padding: 0.5rem; margin-bottom: 0.5rem;
                     min-height: 44px; }
  button { background: #3a7; color: #111; border: none; border-radius: 6px; padding: 0.75rem 1.25rem;
           min-height: 44px; cursor: pointer; }
  button:disabled { background: #2a4; color: #182; cursor: default; opacity: 0.7; }
  #searchBtn { margin-right: 0.5rem; }
  ul { list-style: none; padding: 0; }
  li { border-bottom: 1px solid #333; padding: 0.5rem 0; }
  li .kind { color: #6c9; font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.04em;
             margin-right: 0.4em; }
  li .meta { color: #888; font-size: 0.8em; }
  #error, .status { min-height: 1.2em; margin: 0.25rem 0 0.5rem; font-size: 0.9em; }
  #error, .status.error { color: #f66; }
  .status.ok { color: #6c9; }
</style>
</head>
<body>

<div id="login">
  <h1>Engram</h1>
  <form id="loginForm" onsubmit="login(); return false;">
    <input id="username" name="username" autocomplete="username" placeholder="username">
    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="password">
    <button id="loginBtn" type="submit">Log in</button>
  </form>
  <div id="error"></div>
</div>

<div id="app" style="display:none">
  <h1>Engram</h1>
  <textarea id="note" rows="3" placeholder="Quick note..."></textarea>
  <button id="saveBtn" onclick="save()">Save note</button>
  <div id="noteStatus" class="status"></div>
  <input id="q" type="search" enterkeyhint="search" placeholder="Search..." onkeydown="if(event.key==='Enter') search();">
  <button id="searchBtn" onclick="search()">Search</button>
  <button id="clearBtn" onclick="clearSearch()">Clear</button>
  <div id="searchStatus" class="status"></div>
  <ul id="list"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
